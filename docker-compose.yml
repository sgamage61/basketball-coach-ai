version: "3.9"

services:
  # ─── API ────────────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      target: runtime
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped
    networks:
      - basketball_net

  # ─── Worker (Celery) ────────────────────────────────────────────────────────
  worker:
    build:
      context: .
      target: runtime
    env_file:
      - .env
    depends_on:
      - api
      - redis
    command: celery -A app.workers.game_worker worker --loglevel=info -Q game_events
    restart: unless-stopped
    networks:
      - basketball_net

  # ─── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: basketball_coach
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - basketball_net

  # ─── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - basketball_net

  # ─── Adminer (DB UI — dev only) ──────────────────────────────────────────────
  adminer:
    image: adminer:latest
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    networks:
      - basketball_net
    profiles:
      - dev

networks:
  basketball_net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
